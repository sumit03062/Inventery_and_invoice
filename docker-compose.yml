version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mall_invoice_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: mall_invoice
      MYSQL_USER: invoiceapp
      MYSQL_PASSWORD: secure_password_456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - mall_network

  redis:
    image: redis:7.0
    container_name: mall_invoice_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mall_network

volumes:
  mysql_data:
  redis_data:

networks:
  mall_network:
    driver: bridge